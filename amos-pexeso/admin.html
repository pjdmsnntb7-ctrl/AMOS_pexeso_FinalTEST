<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁMOS Pexeso - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f5f7fa; padding: 40px; text-align: center; color: #2c3e50; }
        .admin-box { background: white; padding: 40px; border-radius: 24px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #1a252f; text-transform: uppercase; font-size: 2rem; }
        input, button { font-family: 'Montserrat', sans-serif; width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; font-weight: 700; }
        input[type="text"] { border: 2px solid #bdc3c7; text-align: center; }
        input[type="file"] { border: 2px dashed #28bebe; background: rgba(40,190,190,0.05); cursor: pointer; }
        button { background: #28bebe; color: white; border: none; cursor: pointer; box-shadow: 0 5px 15px rgba(40,190,190,0.3); }
        #vystup { margin-top: 20px; font-size: 0.9rem; word-break: break-all; padding: 15px; background: #e8f8f8; border-radius: 12px; display: none; color: #16a085; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>Generátor Pexesa 🛠️</h1>
        <p>Vytvoř si nové pexeso bez ajťáka.</p>
        
        <input type="text" id="nazev-hry" placeholder="Název pexesa (např. auta, skola)">
        <input type="file" id="foto-input" multiple accept="image/*">
        <p style="font-size: 0.8rem; color: #7f8c8d;">Vyber přesně 6 nebo 12 fotek.</p>
        
        <button id="btn-generovat">Vytvořit pexeso</button>
        
        <div id="vystup"></div>
    </div>

   <script>
        // Počkáme, až se celá stránka bezpečně načte do paměti
        document.addEventListener('DOMContentLoaded', () => {
            const tlacitko = document.getElementById('btn-generovat');
            
            if (!tlacitko) {
                console.error("Chyba: Tlačítko s ID 'btn-generovat' nebylo nalezeno!");
                return;
            }

            tlacitko.addEventListener('click', async () => {
                const nazevInput = document.getElementById('nazev-hry');
                const fotoInput = document.getElementById('foto-input');
                const vystupDiv = document.getElementById('vystup');

                const nazev = nazevInput.value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                const files = fotoInput.files;

                if (!nazev) {
                    alert('Zadej platný název pexesa!');
                    return;
                }
                if (files.length !== 6 && files.length !== 12) {
                    alert('Musíš vybrat přesně 6 nebo 12 obrázků! Nyní máš vybráno: ' + files.length);
                    return;
                }

                const poleObrazku = [];

                // Pomocná funkce pro převod souboru na text (Base64)
                const readAsBase64 = (file) => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = (e) => reject(e);
                        reader.readAsDataURL(file);
                    });
                };

                try {
                    // Převedeme postupně všechny vybrané soubory
                    for (let i = 0; i < files.length; i++) {
                        const base64String = await readAsBase64(files[i]);
                        poleObrazku.push(base64String);
                    }

                    // Uložení do LocalStorage pod unikátním klíčem
                    localStorage.setItem('amos_pexeso_' + nazev, JSON.stringify(poleObrazku));

                    // Sestavení výsledné URL adresy
                    const aktualniUrl = window.location.href.split('admin.html')[0] + 'index.html';
                    const vyslednyOdkaz = `${aktualniUrl}?hra=${nazev}`;

                    // Zobrazení výsledku pod tlačítkem
                    vystupDiv.style.display = 'block';
                    vystupDiv.innerHTML = `
                        <strong style="display:block; margin-bottom:10px;">Pexeso "Love" úspěšně vytvořeno! 🎉</strong>
                        Odkaz pro ÁMOS panel (klikni pro otevření):<br>
                        <a href="${vyslednyOdkaz}" target="_blank" style="color:#28bebe; word-break:break-all; display:inline-block; margin-top:10px;">${vyslednyOdkaz}</a>
                    `;
                } catch (chyba) {
                    console.error(chyba);
                    alert('Došlo k chybě při zpracování obrázků. Zkus menší soubory.');
                }
            });
        });
    </script>
