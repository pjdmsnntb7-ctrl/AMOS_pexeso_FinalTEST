<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÁMOS Pexeso - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #f5f7fa; padding: 40px; text-align: center; color: #2c3e50; }
        .admin-box { background: white; padding: 40px; border-radius: 24px; max-width: 500px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #1a252f; text-transform: uppercase; font-size: 2rem; margin-bottom: 5px; }
        input, button, textarea { font-family: 'Montserrat', sans-serif; width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; font-size: 1rem; box-sizing: border-box; font-weight: 700; }
        input[type="text"] { border: 2px solid #bdc3c7; text-align: center; }
        input[type="file"] { border: 2px dashed #28bebe; background: rgba(40,190,190,0.05); cursor: pointer; }
        button { background: #28bebe; color: white; border: none; cursor: pointer; box-shadow: 0 5px 15px rgba(40,190,190,0.3); }
        textarea { border: 2px solid #bdc3c7; height: 100px; font-size: 0.8rem; font-weight: 500; resize: none; }
        #vystup { margin-top: 20px; padding: 20px; background: #e8f8f8; border-radius: 12px; display: none; color: #16a085; text-align: left; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>Generátor Pexesa 🛠️</h1>
        <p>Vytvoř si kód nového pexesa.</p>
        
        <input type="text" id="nazev-hry" placeholder="Název pexesa (např. auta, skola)">
        <input type="file" id="foto-input" multiple accept="image/*">
        <p style="font-size: 0.8rem; color: #7f8c8d;">Vyber přesně 6 nebo 12 fotek.</p>
        
        <button id="btn-generovat">Generovat data pexesa</button>
        
        <div id="vystup">
            <strong style="display:block; margin-bottom:10px;">Pexeso vytvořeno! 🎉</strong>
            <p style="font-size: 0.85rem; color: #2c3e50; margin: 0 0 10px 0;">Zkopíruj si tento vygenerovaný kód a vlož ho na hlavní stránce pexesa:</p>
            <textarea id="kod-hry-textarea" readonly></textarea>
            <button id="btn-kopirovat" style="background: #16a085; margin-top: 5px;">Zkopírovat kód</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('btn-generovat').addEventListener('click', async () => {
                const nazev = document.getElementById('nazev-hry').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                const files = document.getElementById('foto-input').files;

                if (!nazev) return alert('Zadej platný název pexesa!');
                if (files.length !== 6 && files.length !== 12) return alert('Vyber přesně 6 nebo 12 obrázků!');

                const poleObrazku = [];
                const readAsBase64 = (file) => {
                    return new Promise((resolve) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.readAsDataURL(file);
                    });
                };

                for (let i = 0; i < files.length; i++) {
                    poleObrazku.push(await readAsBase64(files[i]));
                }

                // Vytvoříme exportní balíček
                const balicek = { nazev: nazev, fotky: poleObrazku };
                const vyslednyText = btoa(encodeURIComponent(JSON.stringify(balicek)));

                document.getElementById('vystup').style.display = 'block';
                document.getElementById('kod-hry-textarea').value = vyslednyText;
            });

            document.getElementById('btn-kopirovat').addEventListener('click', () => {
                const textarea = document.getElementById('kod-hry-textarea');
                textarea.select();
                document.execCommand('copy');
                alert('Kód pexesa byl zkopírován do schránky!');
            });
        });
    </script>
</body>
</html>
